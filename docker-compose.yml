services:
  bot:
    build: .
    container_name: telegram-downloader-bot
    restart: unless-stopped
    volumes:
      - ./downloads:/app/downloads:rw,Z
      - ./logs:/app/logs:rw,Z
      - ./data:/app/data:rw,Z
      - ./telegram-data:/var/lib/telegram-bot-api:rw,Z
      - ./main.py:/app/main.py:ro,Z
      - ./services:/app/services:ro,Z
      - ./handlers:/app/handlers:ro,Z
      - ./.env:/app/.env:ro,Z
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - PYTHONUNBUFFERED=1
      - TELEGRAM_API_URL=http://telegram-bot-api:8081
      - USE_COBALT=${USE_COBALT:-true}
      - COBALT_URL=http://cobalt-api:9000
      - COBALT_API_KEY=${COBALT_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEBHOOK_INTERNAL_HOST=http://telegram-downloader-bot:${WEBAPP_PORT:-8443}
      - WEBAPP_PORT=${WEBAPP_PORT:-8443}
      - CHROME_BIN=/usr/bin/google-chrome-stable
      - CHROME_FLAGS=--no-sandbox --disable-dev-shm-usage --disable-gpu
      - YTDLP_NO_PHANTOM=1
    ports:
      - "${WEBAPP_PORT:-8443}:${WEBAPP_PORT:-8443}"
      - "16881-16890:16881-16890"
      - "16881-16890:16881-16890/udp"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      telegram-bot-api:
        condition: service_started
      cobalt-api:
        condition: service_started
      postgres:
        condition: service_healthy
      home-proxy:
        condition: service_started
    links:
      - postgres
      - cobalt-api
      - telegram-bot-api
      - home-proxy
    networks:
      - bot_network

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - ./telegram-data:/var/lib/telegram-bot-api:Z
    networks:
      - bot_network

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:latest
    container_name: cobalt-api
    restart: always
    ports:
      - "9000:9000"
    environment:
      - API_NAME=${COBALT_API_NAME:-HomeWorker}
      - API_URL=${COBALT_API_URL_PUBLIC}
      - VIDEO_PROXY=${COBALT_VIDEO_PROXY:-true}
      - USE_COOKIES=${COBALT_USE_COOKIES:-true}
      - API_KEY=${COBALT_API_KEY}
      - REQUIRE_API_KEY=${COBALT_REQUIRE_API_KEY:-true}
    volumes:
      - ./data/cookies.txt:/app/cookies.txt:ro,Z
      - ./data/cookies.json:/app/cookies.json:ro,Z
    networks:
      - bot_network

  postgres:
    image: postgres:16-alpine
    container_name: bot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      bot_network:
        aliases:
          - postgres
          - db

  home-proxy:
    image: curve25519xsalsa20poly1305/wireguard-socks5
    container_name: home-proxy
    restart: always
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wg_home.conf:/vpn/wg.conf:ro,Z
    environment:
      - WIREGUARD_CONFIG=/vpn/wg.conf
    networks:
      - bot_network

volumes:
  postgres_data:

networks:
  bot_network:
    driver: bridge